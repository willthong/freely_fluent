{% for img in results %}
  <label class="image-card">
    <input type="checkbox" name="images" value="{{ image_offset + loop.index0 }}" class="image-checkbox">
    <span class="image-checkmark"></span>
    <img src="{{ img.thumbnail_url }}" alt="" class="image-thumb">
    <div class="image-preview-overlay">
      <img src="{{ img.thumbnail_url }}" alt="" class="image-preview-img">
    </div>
  </label>
{% endfor %}
