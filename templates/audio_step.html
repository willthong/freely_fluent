{% extends "base.html" %}
{% block content %}
<h1>Cantonese Pronunciation for {{ characters }}</h1>
<p class="jyutping"><strong>{{ jyutping }}</strong></p>
{% if audio_url %}
<div class="audio-player">
  <audio controls>
    <source src="/sessions/{{ session_id }}/audio" type="audio/ogg">
    Your browser does not support audio playback.
  </audio>
</div>
<p>
  <button type="button"
          id="confirm-wiktionary-btn"
          hx-ext="json-enc"
          hx-post="/audio/{{ session_id }}"
          hx-vals='{"source":"wiktionary"}'
          hx-target="#result"
          hx-on::click="setupConfirmButton(this)"
          hx-on::after-request="handleConfirmResponse(event)">
    Confirm Wiktionary audio
  </button>
</p>
{% else %}
<div class="no-audio">
  <p>No audio available for this character.</p>
</div>
{% endif %}

<!-- Recording section -->
<div id="recording-section" class="recording-section">
  <h2>Record your own pronunciation</h2>
  <p>
    <button type="button"
            id="record-btn"
            onclick="startRecording()">Record</button>
    <button type="button"
            id="stop-btn"
            onclick="stopRecording()"
            disabled>Stop</button>
  </p>
  <p id="recording-status" style="display:none;">Recording...</p>
</div>

<!-- Recording preview (hidden until recording submitted) -->
<div id="recording-preview" style="display:none;">
  <h2>Preview your recording</h2>
  <audio id="preview-audio" controls></audio>
  <p>
    <button type="button"
            id="confirm-recording-btn"
            hx-ext="json-enc"
            hx-post="/audio/{{ session_id }}"
            hx-vals='{"source":"recording"}'
            hx-target="#result"
            hx-on::click="setupConfirmButton(this)"
            hx-on::after-request="handleConfirmResponse(event)">
      Confirm
    </button>
    <button type="button"
            onclick="reRecord()"
            id="rerecord-btn">Re-record</button>
  </p>
</div>

<p><a href="/sessions/{{ session_id }}/skip">Skip this word</a></p>
<div id="result"></div>

<script>
var mediaRecorder = null;
var audioChunks = [];
var recordingBase64 = null;

function setupConfirmButton(btn) {
  btn.disabled = true;
}

function handleConfirmResponse(event) {
  var btn = event.detail.elt;
  try {
    var response = JSON.parse(event.detail.xhr.response);
    if (response.error) {
      // Server returned an error — show message and re-enable button
      btn.disabled = false;
      document.getElementById('result').innerHTML = '<p class="error">' + response.error + '</p>';
    } else if (response.completed) {
      window.location.assign('/complete/{{ session_id }}');
    } else {
      window.location.assign('/translate/{{ session_id }}');
    }
  } catch (e) {
    // Response is not valid JSON — likely an error. Re-enable button.
    btn.disabled = false;
    document.getElementById('result').innerHTML = '<p class="error">An error occurred. Please try again.</p>';
    console.error('Confirm returned invalid response:', event.detail.xhr.status, e);
  }
}

function startRecording() {
  navigator.mediaDevices.getUserMedia({ audio: true })
    .then(function(stream) {
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];
      mediaRecorder.ondataavailable = function(e) {
        audioChunks.push(e.data);
      };
      mediaRecorder.onstop = function() {
        var blob = new Blob(audioChunks, { type: 'audio/webm' });
        var reader = new FileReader();
        reader.onloadend = function() {
          recordingBase64 = reader.result.split(',')[1];
          var dataUrl = 'data:audio/webm;base64,' + recordingBase64;
          fetch('/sessions/{{ session_id }}/recording', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ recording: recordingBase64 })
          }).then(function(resp) {
            if (!resp.ok) {
              console.error('Failed to save recording:', resp.status);
              return;
            }
            document.getElementById('recording-section').style.display = 'none';
            document.getElementById('recording-preview').style.display = 'block';
            document.getElementById('preview-audio').src = dataUrl;
            document.getElementById('confirm-recording-btn').disabled = false;
          });
        };
        reader.readAsDataURL(blob);
      };
      mediaRecorder.start();
      document.getElementById('record-btn').disabled = true;
      document.getElementById('stop-btn').disabled = false;
      document.getElementById('recording-status').style.display = 'inline';
    })
    .catch(function(err) {
      console.error('Microphone access denied:', err);
    });
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(function(t) { t.stop(); });
  }
  document.getElementById('record-btn').disabled = false;
  document.getElementById('stop-btn').disabled = true;
  document.getElementById('recording-status').style.display = 'none';
}

function reRecord() {
  document.getElementById('recording-section').style.display = 'block';
  document.getElementById('recording-preview').style.display = 'none';
  recordingBase64 = null;
  document.getElementById('confirm-recording-btn').disabled = false;
}
</script>
{% endblock %}
