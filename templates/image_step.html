{% extends "base.html" %}
{% block step_bar %}
<div class="step-bar">
  <button type="submit" class="step done step-back"
          hx-post="/sessions/{{ session_id }}/back-to/translate"
          hx-target="body"
          hx-swap="innerHTML">
    Translate
  </button>
  <span class="step active">Image</span>
  <span class="step">Audio</span>
</div>
{% endblock %}
{% block content %}
<h1>Select Images</h1>
{% if results %}
<div class="re-search-row">
  <label for="re-search-input">Search custom images:</label>
  <input type="text"
         id="re-search-input"
         class="search-input"
         placeholder="Search custom images…"
         name="query">
  <button type="button" class="btn-outline"
          hx-get="/image/{{ session_id }}/research"
          hx-target="#image-grid"
          hx-swap="innerHTML"
          hx-include="#re-search-input"
          hx-indicator="#re-search-indicator">
    Search in Chinese
  </button>
  <button type="button" class="btn-outline"
          hx-get="/image/{{ session_id }}/research?query={{ english_word }}"
          hx-target="#image-grid"
          hx-swap="innerHTML"
          hx-indicator="#en-search-indicator">
    Search in English 🔤
  </button>
  <span id="re-search-indicator" class="htmx-indicator">Searching…</span>
  <span id="en-search-indicator" class="htmx-indicator">Searching…</span>
</div>
<form id="image-form" method="post" action="/image/{{ session_id }}">
  <div id="image-grid" class="image-grid">
    {% include "_image_cards.html" with context %}
  </div>
  <p>
    <button type="submit" class="btn-primary">Continue to Audio</button>
    <button type="button"
            id="load-more-btn"
            class="btn-outline"
            hx-get="/image/{{ session_id }}/load-more"
            hx-target="#image-grid"
            hx-swap="beforeend"
            hx-indicator="#load-more-indicator">
      Load more images
    </button>
    <span id="load-more-indicator" class="htmx-indicator">Loading...</span>
  </p>
</form>
<p><button type="button" class="btn-skip"
        hx-get="/sessions/{{ session_id }}/skip"
        hx-target="body"
        hx-swap="innerHTML">Skip this word</button></p>
{% else %}
<p>No images found.</p>
<p><button type="button" class="btn-skip"
        hx-get="/sessions/{{ session_id }}/skip"
        hx-target="body"
        hx-swap="innerHTML">Skip this word</button></p>
{% endif %}

<script>
// Mobile long-press for image preview
var longPressTimer = null;
var previewCard = null;
var previewPopup = null;
var overlay = null;
var grid = document.getElementById('image-grid');

function showPreview(card) {
  clearTimeout(longPressTimer);
  // Guard: contextmenu may have already called us for this card.
  // Don't overwrite previewPopup with a second querySelector that
  // returns null (the popup was already moved to document.body).
  if (!previewPopup) {
    previewPopup = card.querySelector('.image-preview-popup');
    if (previewPopup) {
      document.body.appendChild(previewPopup);
      previewPopup.style.display = 'flex';
    }
  }
  // Create backdrop overlay as a real DOM element
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'preview-backdrop';
    var s = overlay.style;
    s.position = 'fixed';
    s.top = '0';
    s.left = '0';
    s.right = '0';
    s.bottom = '0';
    s.background = 'rgba(0,0,0,0.5)';
    s.zIndex = '999';
    document.body.appendChild(overlay);
  }
  previewCard = card;
  card.classList.add('pressed');
}

function dismissPreview() {
  clearTimeout(longPressTimer);
  if (previewPopup) {
    previewPopup.style.display = 'none';
    // Move popup back to its original card
    if (previewCard) {
      previewCard.appendChild(previewPopup);
    }
    previewPopup = null;
  }
  if (previewCard) {
    previewCard.classList.remove('pressed');
    previewCard = null;
  }
  if (overlay) {
    overlay.remove();
    overlay = null;
  }
}

function startHold(e) {
  var card = e.target.closest('.image-card');
  if (!card) return;
  clearTimeout(longPressTimer);  // cancel any prior timer (startHold may be called twice: touchstart + pointerdown)
  previewCard = card;
  longPressTimer = setTimeout(function() {
    if (previewCard) {
      showPreview(card);
    }
  }, 650);
}

if (grid) {
  // Touch events (Chrome/Safari mobile) — on grid for start, on document for end
  grid.addEventListener('touchstart', startHold, {passive: true});
  document.addEventListener('touchend', dismissPreview, {passive: true});
  document.addEventListener('touchmove', dismissPreview, {passive: true});
  document.addEventListener('touchcancel', dismissPreview, {passive: true});

  // Pointer events (Firefox mobile/desktop, Edge, modern Chrome)
  grid.addEventListener('pointerdown', startHold);
  document.addEventListener('pointerup', dismissPreview);
  document.addEventListener('pointermove', dismissPreview);
  document.addEventListener('pointercancel', dismissPreview);

  // Suppress browser context menu (Save Image dialog).
  // We do NOT show the preview here — it's too sensitive (contextmenu
  // fires at ~300ms, giving false positives on quick holds). Preview
  // is shown only by the 650ms timer in startHold().
  grid.addEventListener('contextmenu', function(e) {
    if (e.target.closest('.image-card')) {
      e.preventDefault();
    }
  });

  // Dismiss on any click/tap
  document.addEventListener('click', function(e) {
    if (previewCard || longPressTimer) {
      dismissPreview();
    }
  });
}
</script>
{% endblock %}
