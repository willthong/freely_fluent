{% extends "base.html" %}
{% block content %}
<h1>Select Images</h1>
{% if results %}
<form method="post" action="/image/{{ session_id }}">
  {% for img in results %}
  <label>
    <input type="checkbox" name="images" value="{{ loop.index0 }}">
    <img src="{{ img.thumbnail_url }}" width="200">
  </label>
  {% endfor %}
  <button type="submit">Continue to Audio</button>
</form>
<p><a href="/sessions/{{ session_id }}/skip">Skip this word</a></p>
{% else %}
<p>No images found.</p>
<p><a href="/sessions/{{ session_id }}/skip">Skip this word</a></p>
{% endif %}
{% endblock %}
