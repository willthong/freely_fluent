{% extends "base.html" %}
{% block step_bar %}
<div class="step-bar">
  <button type="submit" class="step done step-back"
          hx-post="/sessions/{{ session_id }}/back-to/translate"
          hx-target="body"
          hx-swap="innerHTML">
    Translate
  </button>
  <span class="step active">Image</span>
  <span class="step">Audio</span>
</div>
{% endblock %}
{% block content %}
<h1>Select Images</h1>
{% if results %}
<div class="re-search-row">
  <label for="re-search-input">Search custom images:</label>
  <input type="text"
         id="re-search-input"
         class="search-input"
         placeholder="Search custom images…"
         name="query">
  <button type="button" class="btn-outline"
          hx-get="/image/{{ session_id }}/research"
          hx-target="#image-grid"
          hx-swap="innerHTML"
          hx-include="#re-search-input"
          hx-indicator="#re-search-indicator">
    Search
  </button>
  <span id="re-search-indicator" class="htmx-indicator">Searching…</span>
</div>
<form id="image-form" method="post" action="/image/{{ session_id }}">
  <div id="image-grid" class="image-grid">
    {% include "_image_cards.html" with context %}
  </div>
  <p>
    <button type="submit" class="btn-primary">Continue to Audio</button>
    <button type="button"
            id="load-more-btn"
            class="btn-outline"
            hx-get="/image/{{ session_id }}/load-more"
            hx-target="#image-grid"
            hx-swap="beforeend"
            hx-indicator="#load-more-indicator">
      Load more images
    </button>
    <span id="load-more-indicator" class="htmx-indicator">Loading...</span>
  </p>
</form>
<p><button type="button" class="btn-skip"
        hx-get="/sessions/{{ session_id }}/skip"
        hx-target="body"
        hx-swap="innerHTML">Skip this word</button></p>
{% else %}
<p>No images found.</p>
<p><button type="button" class="btn-skip"
        hx-get="/sessions/{{ session_id }}/skip"
        hx-target="body"
        hx-swap="innerHTML">Skip this word</button></p>
{% endif %}

<script>
// Mobile long-press for image preview
var longPressTimer = null;
var previewCard = null;
var grid = document.getElementById('image-grid');

function dismissPreview() {
  clearTimeout(longPressTimer);
  if (previewCard) {
    previewCard.classList.remove('pressed');
    previewCard = null;
  }
}

if (grid) {
  grid.addEventListener('touchstart', function(e) {
    var card = e.target.closest('.image-card');
    if (!card) return;
    previewCard = card;
    var touchEvent = e;
    longPressTimer = setTimeout(function() {
      /*
       * Suppress the browser's native long-press behavior
       * (Save Image dialog on Android, callout on iOS).
       * With {passive: false}, preventDefault() is honored.
       * We call it here (not sync in the handler) so scrolling
       * on a quick touch is unaffected.
       */
      try { touchEvent.preventDefault(); } catch(_) {}
      card.classList.add('pressed');
    }, 500);
  }, {passive: false});

  grid.addEventListener('touchend', function(e) {
    clearTimeout(longPressTimer);
    var card = e.target.closest('.image-card');
    if (card) {
      /*
       * If the long-press timer already fired, card has 'pressed'.
       * Remove it immediately on finger lift — no delay.
       * If timer hadn't fired yet (quick tap), dismiss is a no-op
       * because pressed was never added.
       */
      card.classList.remove('pressed');
    }
    previewCard = null;
  }, {passive: true});

  grid.addEventListener('touchmove', function(e) {
    clearTimeout(longPressTimer);
  }, {passive: true});

  /* Also dismiss on any click/tap outside the grid or on a non-pressed card */
  document.addEventListener('click', function(e) {
    if (previewCard && !e.target.closest('.image-card')) {
      dismissPreview();
    }
  });
}
</script>
{% endblock %}
