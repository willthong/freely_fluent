{% for entry in entries %}
<div class="entry-card">
  <label class="entry-label">
    <input type="radio" name="chinese" value="{{ entry.chinese }}" class="entry-radio"
           hx-post="/sessions/{{ session_id }}/select-entry"
           hx-target="#pos-dropdown-area"
           hx-swap="innerHTML"
           hx-trigger="change">
    <span class="entry-chinese">{{ entry.chinese }}</span>
    <span class="entry-jyutping">{{ entry.jyutping|format_jyutping }}</span>
    <span class="entry-definition">{{ entry.definition }}</span>
  </label>
</div>
{% endfor %}
