name: Build and push container image
on:
  push:
    branches:
      - main
      - dev

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  docker-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest

      - name: Compute next version (main only)
        id: svu
        if: github.ref_name == 'main'
        run: |
          wget -q https://github.com/caarlos0/svu/releases/download/v3.4.1/svu_3.4.1_linux_amd64.tar.gz
          tar -xzf svu_3.4.1_linux_amd64.tar.gz
          chmod +x svu
          echo "version=$(./svu next)" >> "$GITHUB_OUTPUT"

      - name: Build and push (main)
        if: github.ref_name == 'main'
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.svu.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Build and push (dev)
        if: github.ref_name == 'dev'
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref_name == 'main' || github.ref_name == 'dev'

    steps:
      - name: Deploy to dev
        if: github.ref_name == 'dev'
        run: |
          cd /sharedfolders/AppData/fluent_forever_dev
          docker compose pull
          docker compose up -d

      - name: Deploy to production
        if: github.ref_name == 'main'
        run: |
          cd /sharedfolders/AppData/fluent_forever
          docker compose pull
          docker compose up -d
